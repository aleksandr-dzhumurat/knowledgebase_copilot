name: Version Bump on Merge

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    # Skip if this push is itself the version-bump commit (prevents infinite loop)
    if: "!contains(github.event.head_commit.message, '[version-bump]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump patch version in pyproject.toml
        id: bump
        run: |
          python - <<'EOF'
          import re, pathlib

          path = pathlib.Path("pyproject.toml")
          content = path.read_text()

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")

          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"

          new_content = re.sub(
              r'^(version\s*=\s*)"(\d+\.\d+\.\d+)"',
              f'\\g<1>"{new_version}"',
              content,
              flags=re.MULTILINE,
          )
          path.write_text(new_content)
          print(f"Bumped to {new_version}")

          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"new_version={new_version}\n")
          EOF

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "[version-bump] v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin master --tags
